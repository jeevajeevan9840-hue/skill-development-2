<!DOCTYPE html>
<html>
<head>
    <title>Input Types</title>
</head>
<body>
    <h1>Input Types</h1>
    <form>
        Text :
        <input type="text">
        <br><br>
        Password :
        <input type="password">
        <br><br>
        Email :
        <input type="email">
        <br><br>
        Number :
        <input type="number">
        <br><br>
        Date :
        <input type="date">
        <br><br>
        Time :
        <input type="time">
        <br><br>
        Color :
        <input type="color">
        <br><br>
        Range :
        <input type="range">
        <br><br>
        File :
        <input type="file">
        <br><br>
        Search :
        <input type="search">
        <br><br>
        URL :
        <input type="url">
        <br><br>
        Phone :
        <input type="tel">
        <br><br>
        Radio :
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>
        Checkbox :
        <input type="checkbox"> Cricket
        <input type="checkbox"> Football
        <br><br>
        Button :
        <input type="button" value="Click Here">
        <br><br>
        Submit :
        <input type="submit">
        <br><br>
        Reset :
        <input type="reset">
        <br><br>
    </form>
</body>
</html>
