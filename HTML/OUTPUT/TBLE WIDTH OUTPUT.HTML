<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Table</title>
    <style>
        table, th, td {
            border: 1px dashed blueviolet;
            border-radius: 5px;
            border-collapse: collapse;
            padding: 8px;
            width: 50%; /* From table width.png */
        }
    </style>
</head>
<body>

    <table style="height: 80px;">
        <tr>
            <th>Bike</th>
            <th>Car</th>
            <th>Bicycle</th>
        </tr>
        <tr>
            <td>KTM</td>
            <td>Audi</td>
            <td>Hero</td>
        </tr>
    </table>

</body>
</html>
