<!-- success.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success</title>

    <style>

        body{
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(to right, green, limegreen);
            font-family:Arial;
        }

        .success-box{
            background:white;
            padding:50px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
        }

        h1{
            color:green;
            font-size:40px;
        }

        p{
            font-size:20px;
        }

        a{
            text-decoration:none;
            background:green;
            color:white;
            padding:12px 20px;
            border-radius:5px;
            display:inline-block;
            margin-top:20px;
        }

        a:hover{
            background:black;
        }

    </style>

</head>
<body>

    <div class="success-box">
        <h1>Order Successful!</h1>
        <p>Your shoes order has been placed successfully.</p>
    </div>

</body>
</html>
