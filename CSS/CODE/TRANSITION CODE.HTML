<!DOCTYPE html>
<html>
<head>
    <title>css Transition Example</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        .box{
            width: 200px;
            height: 200px;
            background-color: blue;
            margin: auto;

            /* Transition */
            transition: 1s;
        }

        .box:hover{
            background-color: red;
            transform: rotate(20deg) scale(1.2);
            border-radius: 50%;
        }
    </style>
</head>

<body>
