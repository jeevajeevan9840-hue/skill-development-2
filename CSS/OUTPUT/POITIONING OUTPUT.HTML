<!DOCTYPE html>
<html>
<head>
    <title>CSS Positioning</title>

    <!-- CSS LINK -->
    <link rel="stylesheet" href="C:\Users\jeevan\Downloads\POITIONING CODEING.CSS">
</head>

<body>

    <h1>CSS Positioning Example</h1>

    <div class="static-box">
        Static Position
    </div>

    <div class="relative-box">
        Relative Position
    </div>

    <div class="container">
        <div class="absolute-box">
            Absolute Position
        </div>
    </div>

    <div class="sticky-box">
        Sticky Position
    </div>

    <p>
        Scroll down to see fixed and sticky positioning effect.
    </p>

    <br><br><br><br><br><br><br><br><br><br><br><br>

    <div class="fixed-box">
        Fixed Position
    </div>

</body>
</html>
